version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saasdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A app.core.celery_app worker --loglevel=info -Q default,email --concurrency=4

  beat:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: celery -A app.core.celery_app beat --loglevel=info

  flower:
    build: .
    restart: always
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app flower --port=5555

volumes:
  postgres_data:
